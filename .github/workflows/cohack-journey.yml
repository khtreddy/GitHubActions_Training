name: CoHackJourney

on: push

jobs:
  hello-world:
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello
        run: echo "Hello World!"

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: List Files
        run: ls -la

      - name: Generate ASCII Artwork
        run: |
          sudo apt-get install -y figlet
          figlet "GH-200 CoHack for ANZ"
          echo "-------------------------------------------"
          figlet -f slant "GitHub Actions"
          echo "✅ ASCII art generated using figlet!"

      - name: Run Shell Script
        run: |
          chmod +x ./greet.sh
          ./greet.sh
